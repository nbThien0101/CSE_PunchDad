name: Keep Render Alive

on:
  schedule:
    # Chạy mỗi 14 phút, từ 00:00 đến 17:59 UTC 
    # (Tương đương từ 07:00 sáng đến 00:59 sáng hôm sau theo giờ Việt Nam - UTC+7)
    - cron: '*/14 0-17 * * *'
  workflow_dispatch: # Cho phép trigger thủ công từ giao diện GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Check
        run: |
          # Dùng curl để gọi API health check
          # Trả về HTTP status code để theo dõi
          echo "Pinging server..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_API_URL }}/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Warning: Server returned non-200 status code"
          fi
